<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TallyShot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #110e38; color: #e2e8f0;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 40px 20px;
    }
    .wrap { max-width: 480px; text-align: center; }
    .icon { font-size: 64px; margin-bottom: 24px; }
    h1 { font-size: 36px; font-weight: 800; color: #fff; margin-bottom: 12px; }
    p { font-size: 16px; color: #a5b4fc; line-height: 1.6; margin-bottom: 32px; }
    .badge {
      display: inline-block; background: #6366f1; color: #fff;
      padding: 8px 20px; border-radius: 100px; font-size: 14px; font-weight: 600;
      margin-bottom: 40px;
    }
    a {
      display: block; color: #6366f1; font-size: 14px;
      text-decoration: none; margin-top: 16px;
    }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="icon">🧾</div>
    <h1>TallyShot</h1>
    <p>Snap a receipt. AI reads it. Done.<br/>
    Coming soon to the Google Play Store.</p>
    <span class="badge">Coming soon</span>
    <a href="privacy-policy.html">Privacy Policy</a>
  </div>
</body>
</html>
